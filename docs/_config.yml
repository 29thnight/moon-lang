title: PrSM
description: Unity-first scripting language toolkit documentation
remote_theme: just-the-docs/just-the-docs
plugins:
  - jekyll-remote-theme

search_enabled: true
heading_anchors: true
nav_enabled: true
nav_sort: case_insensitive
color_scheme: dark

footer_content: "PrSM documentation site generated from the docs folder."

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default
