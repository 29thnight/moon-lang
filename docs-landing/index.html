<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="PrSM brand landing page for the Unity-first scripting language toolkit."
    />
    <title>PrSM</title>
    <script>
      // Restore path from GitHub Pages 404 redirect query param
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            });
          window.history.replaceState(
            null,
            null,
            l.pathname.replace(/\/$/, '') +
              decoded[0] +
              (decoded[1] ? '&' + decoded[1] : '') +
              l.hash
          );
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
