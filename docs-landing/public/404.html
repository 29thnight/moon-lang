<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>PrSM</title>
    <script>
      // GitHub Pages SPA redirect
      // When GitHub Pages returns 404 for a deep link, redirect back to the
      // root index.html preserving the path as a query-string parameter.
      // Segment count = 1 for project pages (e.g. /moon-lang/).
      var segmentCount = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + segmentCount)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(segmentCount)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search
            ? '&' + l.search.slice(1).replace(/&/g, '~and~')
            : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
