name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────────────────────────────────────────────
  # 1. Build compiler binaries (cross-platform)
  # ─────────────────────────────────────────────────────────────────
  build-compiler:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: prism-linux-x64
            binary: prism
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: prism-macos-arm64
            binary: prism
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: prism-windows-x64
            binary: prism.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release -p refraction --target ${{ matrix.target }}

      - name: Run tests
        run: cargo test -p refraction

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}

  # ─────────────────────────────────────────────────────────────────
  # 2. Build VS Code extension (VSIX)
  # ─────────────────────────────────────────────────────────────────
  build-vsix:
    needs: build-compiler
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: prism-windows-x64
          path: target/release

      - name: Install dependencies
        working-directory: vscode-prsm
        run: npm ci

      - name: Bundle extension
        working-directory: vscode-prsm
        run: npm run bundle

      - name: Package VSIX
        working-directory: vscode-prsm
        run: npm run package

      - name: Verify package
        working-directory: vscode-prsm
        run: npm run verify

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: vscode-prsm/artifacts/*.vsix

  # ─────────────────────────────────────────────────────────────────
  # 3. Build MSI installer (Windows)
  # ─────────────────────────────────────────────────────────────────
  build-msi:
    needs: [build-compiler, build-vsix]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-wix
        run: cargo install cargo-wix

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: prism-windows-x64
          path: target/release

      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: vsix
          path: vscode-prsm/artifacts

      - name: Build MSI
        run: cargo wix -p refraction --no-build --nocapture

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: msi
          path: target/wix/*.msi

  # ─────────────────────────────────────────────────────────────────
  # 4. Publish release
  # ─────────────────────────────────────────────────────────────────
  publish:
    needs: [build-compiler, build-vsix]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && !failure() && !cancelled()
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          cp release-artifacts/prism-linux-x64/prism release/prism-linux-x64
          cp release-artifacts/prism-macos-arm64/prism release/prism-macos-arm64
          cp release-artifacts/prism-windows-x64/prism.exe release/prism-windows-x64.exe
          cp release-artifacts/vsix/*.vsix release/
          # MSI is optional — copy if available
          cp release-artifacts/msi/*.msi release/ 2>/dev/null || true
          chmod +x release/prism-linux-x64 release/prism-macos-arm64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*

      # ── VS Code Marketplace publish ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --packagePath release/*.vsix --pat "$VSCE_PAT"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  # ─────────────────────────────────────────────────────────────────
  # 5. Submit winget manifest (auto PR to winget-pkgs)
  # ─────────────────────────────────────────────────────────────────
  winget-publish:
    needs: [publish, build-msi]
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v') && needs.build-msi.result == 'success'
    steps:
      - name: Submit to winget
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: PrSM.PrSM
          installers-regex: '\.msi$'
          token: ${{ secrets.WINGET_TOKEN }}
